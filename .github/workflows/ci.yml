name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements-dev.txt
          .venv/bin/pip install -e "core[api,pydantic-ai]" -e setup
          .venv/bin/pip install -e ui
          .venv/bin/pip install -e indexer
          .venv/bin/pip install -e voice
          .venv/bin/pip install pytest-asyncio httpx
      - name: Lint
        run: make lint
      - name: Ansible syntax check
        run: make syntax
      - name: Tests
        run: make test

  provision-smoke:
    runs-on: ubuntu-latest
    # Heavy (~10 min: full desktop package set). Scope to provisioning changes
    # later via `on.pull_request.paths` if it becomes annoying.
    steps:
      - uses: actions/checkout@v6
      - name: Provisioning smoke test in Docker
        run: make test-provision

  deb-build:
    runs-on: ubuntu-latest
    # Build the amd64 .deb, install it in a clean container, smoke-test the CLIs.
    steps:
      - uses: actions/checkout@v6
      - name: Build and verify the .deb
        run: make test-deb
      - uses: actions/upload-artifact@v4
        with:
          name: kowalski-deb-amd64
          path: dist/*.deb
          if-no-files-found: error
