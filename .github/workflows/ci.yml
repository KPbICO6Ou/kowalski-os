name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements-dev.txt
          .venv/bin/pip install -e "core[api,pydantic-ai]" -e setup
          .venv/bin/pip install pytest-asyncio httpx
          # PyPI toolbox 0.0.1 lags main (no fs.grep/move/copy) — git until 0.0.2
          .venv/bin/pip install --force-reinstall --no-deps \
            "pydantic-ai-toolbox @ git+https://github.com/wachawo/pydantic-ai-toolbox.git"
      - name: Lint
        run: make lint
      - name: Ansible syntax check
        run: make syntax
      - name: Tests
        run: make test

  provision-smoke:
    runs-on: ubuntu-latest
    # Heavy (~10 min: full desktop package set). Scope to provisioning changes
    # later via `on.pull_request.paths` if it becomes annoying.
    steps:
      - uses: actions/checkout@v6
      - name: Provisioning smoke test in Docker
        run: make test-provision
