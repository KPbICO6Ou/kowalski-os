---
# Main user of the desktop system.
kowalski_user: kowalski

# Set to true when running roles inside a container (smoke tests):
# skips systemd/sysctl/kernel tasks that need a real booted system.
kowalski_in_container: false

# Architecture mapping (amd64 / arm64). Derived facts used by roles below.
kowalski_deb_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
# NVIDIA CUDA repo path: x86_64 for amd64, sbsa (Server Base System Arch) for arm64.
# Jetson (L4T/JetPack) is NOT covered by this path — see docs/provisioning.md.
cuda_repo_arch: "{{ 'sbsa' if ansible_architecture == 'aarch64' else 'x86_64' }}"

# NVIDIA: explicit package instead of `ubuntu-drivers install` (idempotency).
# The -server driver series ships for both amd64 and arm64 (SBSA) on noble.
nvidia_driver_pkg: nvidia-driver-570-server
cuda_keyring_url: >-
  https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/{{ cuda_repo_arch }}/cuda-keyring_1.1-1_all.deb
cuda_toolkit_pkg: cuda-toolkit-12-6

# Ollama
ollama_version: "0.9.0"
ollama_tarball_url: >-
  https://github.com/ollama/ollama/releases/download/v{{ ollama_version }}/ollama-linux-{{ kowalski_deb_arch }}.tgz
ollama_models:
  - qwen2.5:14b
  - nomic-embed-text

# Desktop
desktop_packages:
  - xfce4
  - xfce4-goodies
  - xfce4-terminal     # the terminal the voice-chat autostart opens
  - wmctrl             # raise/focus the chat window on the wake word
  - xdotool            # window-raise fallback (also used by core uiauto)
  - lightdm
  - slick-greeter
  - xorg
